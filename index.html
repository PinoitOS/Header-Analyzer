<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Header Analyzer</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23070b18'/%3E%3Ccircle cx='28' cy='28' r='14' fill='none' stroke='%2319c7d4' stroke-width='6'/%3E%3Cpath d='M39 39 L52 52' stroke='%238b5cf6' stroke-width='7' stroke-linecap='round'/%3E%3Ccircle cx='28' cy='28' r='7' fill='%23111827'/%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #070b18;
            --surface: #111827;
            --surface-2: #0d1424;
            --border: rgba(124, 140, 181, 0.22);
            --text: #e6edf7;
            --text-muted: #8d9ab8;
            --primary: #19c7d4;
            --primary-hover: #42e8f2;
            --accent: #8b5cf6;
            --success: #35d07f;
            --warning: #f7b955;
            --error: #ff5f8f;
            --info: #56a8ff;
            --badge-pass: #17b978;
            --badge-fail: #e84678;
            --badge-warn: #d99b35;
            --badge-none: #64748b;
            --badge-info: #3787ff;
            --shadow: rgba(0,0,0,0.48);
            --glow: rgba(25,199,212,0.22);
        }
        .light { --bg: #eef4fb; --surface: #ffffff; --surface-2: #f7faff; --border: rgba(45,64,99,0.18); --text: #152033; --text-muted: #5c6b84; --primary: #0369a1; --primary-hover: #0284c7; --accent: #6d28d9; --shadow: rgba(15,23,42,0.12); --glow: rgba(2,132,199,0.16); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Trebuchet MS', -apple-system, BlinkMacSystemFont, sans-serif; background: radial-gradient(circle at 20% 0%, rgba(139,92,246,0.18), transparent 28%), radial-gradient(circle at 85% 12%, rgba(25,199,212,0.14), transparent 30%), var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; letter-spacing: 0.01em; }
        .header { position: sticky; top: 0; z-index: 100; background: rgba(17,24,39,0.88); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0.85rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; box-shadow: 0 12px 32px rgba(0,0,0,0.24); }
        .light .header { background: rgba(255,255,255,0.86); }
        .logo { width: 32px; height: 32px; }
        .logo svg { width: 100%; height: 100%; }
        .header h1 { font-size: 1.05rem; font-weight: 700; flex: 1; letter-spacing: 0.08em; text-transform: uppercase; }
        .theme-toggle { background: linear-gradient(135deg, rgba(25,199,212,0.12), rgba(139,92,246,0.1)); border: 1px solid var(--border); border-radius: 10px; padding: 0.55rem; cursor: pointer; color: var(--text); display: flex; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02); }
        .theme-toggle:hover { border-color: var(--primary); box-shadow: 0 0 0 3px var(--glow); }
        .theme-toggle svg { width: 18px; height: 18px; }
        .lang-toggle { display: flex; gap: 0.2rem; padding: 0.2rem; border: 1px solid var(--border); border-radius: 10px; background: rgba(255,255,255,0.04); }
        .lang-btn { border: none; border-radius: 7px; padding: 0.38rem 0.55rem; background: transparent; color: var(--text-muted); font-size: 0.72rem; font-weight: 850; cursor: pointer; letter-spacing: 0.06em; }
        .lang-btn.active { color: #fff; background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 8px 22px var(--glow); }
        .light .lang-btn.active { color: #fff; }
        .main { display: flex; min-height: calc(100vh - 57px); }
        .input-panel { width: 400px; min-width: 400px; background: linear-gradient(180deg, rgba(17,24,39,0.96), rgba(13,20,36,0.96)); border-right: 1px solid var(--border); padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .light .input-panel { background: linear-gradient(180deg, #fff, #f7faff); }
        .input-panel label { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; color: var(--primary); }
        .input-panel textarea { flex: 1; min-height: 300px; background: rgba(7,11,24,0.72); border: 1px solid var(--border); border-radius: 12px; padding: 0.9rem; color: var(--text); font-family: 'Cascadia Mono', 'Consolas', monospace; font-size: 0.75rem; resize: none; box-shadow: inset 0 0 24px rgba(0,0,0,0.18); }
        .light .input-panel textarea { background: #f8fbff; }
        .input-panel textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--glow), inset 0 0 24px rgba(0,0,0,0.18); }
        .btn-row { display: flex; gap: 0.5rem; }
        .btn { padding: 0.68rem 1rem; border-radius: 10px; font-size: 0.82rem; font-weight: 750; cursor: pointer; border: none; font-family: inherit; letter-spacing: 0.02em; transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease; }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; flex: 1; box-shadow: 0 10px 28px rgba(25,199,212,0.22); }
        .btn-primary:hover { background: linear-gradient(135deg, var(--primary-hover), var(--accent)); box-shadow: 0 14px 36px rgba(25,199,212,0.28); }
        .btn-secondary { background: rgba(255,255,255,0.04); border: 1px solid var(--border); color: var(--text); }
        .light .btn-secondary { background: rgba(255,255,255,0.74); }
        .btn-secondary:hover { border-color: var(--primary); box-shadow: 0 0 0 3px var(--glow); }
        .link-btn { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; color: var(--primary); font-size: 0.82rem; cursor: pointer; text-decoration: none; padding: 0.68rem 1rem; font-weight: 750; letter-spacing: 0.02em; transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease; display: block; text-align: center; }
        .light .link-btn { background: rgba(255,255,255,0.74); }
        .link-btn:hover { border-color: var(--primary); box-shadow: 0 0 0 3px var(--glow); transform: translateY(-1px); }
        .results-panel { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.55rem; }
        .report-actions { display: none; position: sticky; top: 57px; z-index: 80; background: rgba(17,24,39,0.86); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; gap: 0.5rem; align-items: center; }
        .light .report-actions { background: rgba(255,255,255,0.86); }
        .drawer-backdrop { display: none; position: fixed; inset: 57px 0 0 0; background: rgba(0,0,0,0.55); z-index: 85; }
        body:not(.report-mode) .main { align-items: center; justify-content: center; padding: 1rem; }
        body:not(.report-mode) .input-panel { width: min(900px, calc(100vw - 2rem)); min-width: 0; height: calc(100vh - 110px); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 24px 80px var(--shadow), 0 0 0 1px rgba(255,255,255,0.03); }
        body:not(.report-mode) .results-panel { display: none; }
        body.report-mode .report-actions { display: flex; }
        body.report-mode .main { min-height: calc(100vh - 111px); }
        body.report-mode .results-panel { width: 100%; padding: 1.25rem 1.75rem 2.5rem; }
        body.report-mode .input-panel { position: fixed; top: 57px; left: 0; bottom: 0; z-index: 90; transform: translateX(-105%); transition: transform 0.2s ease; box-shadow: 20px 0 50px var(--shadow); }
        body.input-open .input-panel { transform: translateX(0); }
        body.input-open .drawer-backdrop { display: block; }
        .card { background: linear-gradient(180deg, rgba(17,24,39,0.94), rgba(13,20,36,0.94)); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 16px 42px rgba(0,0,0,0.20); margin-bottom: 0.15rem; }
        .card + .card { margin-top: 0.35rem; }
        .light .card { background: linear-gradient(180deg, #ffffff, #f8fbff); box-shadow: 0 16px 36px rgba(15,23,42,0.08); }
        .card-header { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.65rem; background: linear-gradient(135deg, rgba(25,199,212,0.10), rgba(139,92,246,0.08)); }
        .card-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.7rem; color: #fff; font-weight: 800; box-shadow: 0 8px 22px rgba(0,0,0,0.18); }
        .card-icon.success { background: var(--success); }
        .card-icon.error { background: var(--error); }
        .card-icon.warning { background: var(--warning); }
        .card-icon.info { background: var(--info); }
        .card-icon.default { background: var(--primary); }
        .card-title { font-weight: 800; font-size: 0.86rem; letter-spacing: 0.045em; text-transform: uppercase; }
        .card-body { padding: 1rem; }
        .field-row { display: flex; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
        .field-row:last-child { border-bottom: none; }
        .field-key { width: 180px; min-width: 180px; font-family: 'Cascadia Mono', 'Consolas', monospace; font-size: 0.72rem; color: var(--text-muted); font-weight: 700; }
        .field-value { flex: 1; font-family: 'Cascadia Mono', 'Consolas', monospace; font-size: 0.74rem; word-break: break-all; }
        .field-desc { color: var(--text-muted); font-size: 0.625rem; margin-left: 0.5rem; }
        .badge { display: inline-block; padding: 0.16rem 0.54rem; border-radius: 999px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.055em; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12); }
        .badge-pass { background: var(--badge-pass); color: #fff; }
        .badge-fail { background: var(--badge-fail); color: #fff; }
        .badge-warn { background: var(--badge-warn); color: #fff; }
        .badge-none { background: var(--badge-none); color: #fff; }
        .badge-info { background: var(--badge-info); color: #fff; }
        .risk-banner { padding: 1.1rem; border-radius: 14px; text-align: center; font-weight: 850; font-size: 1rem; margin-bottom: 1rem; letter-spacing: 0.09em; text-transform: uppercase; }
        .risk-low { background: linear-gradient(135deg, rgba(53,208,127,0.18), rgba(25,199,212,0.08)); border: 1px solid rgba(53,208,127,0.55); color: var(--success); }
        .risk-medium { background: linear-gradient(135deg, rgba(247,185,85,0.2), rgba(139,92,246,0.06)); border: 1px solid rgba(247,185,85,0.58); color: var(--warning); }
        .risk-high { background: linear-gradient(135deg, rgba(255,95,143,0.22), rgba(139,92,246,0.10)); border: 1px solid rgba(255,95,143,0.68); color: var(--error); box-shadow: 0 0 36px rgba(255,95,143,0.12); }
        .finding-ok { background: var(--success); }
        .finding-fail { background: var(--error); }
        .finding-warn { background: var(--warning); }
        .finding-info { background: var(--info); }
        .hop-chain { display: flex; flex-direction: column; gap: 0.75rem; }
        .hop-item { display: flex; gap: 0.75rem; }
        .hop-number { width: 28px; height: 28px; background: var(--primary); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; }
        .hop-card { flex: 1; background: rgba(7,11,24,0.5); border: 1px solid var(--border); border-radius: 12px; padding: 0.8rem; }
        .light .hop-card { background: #f8fbff; }
        .hop-route { font-size: 0.75rem; font-family: 'Cascadia Mono', 'Consolas', monospace; margin-bottom: 0.5rem; color: var(--primary); }
        .hop-detail { display: flex; gap: 1rem; flex-wrap: wrap; font-size: 0.75rem; color: var(--text-muted); }
        .hop-detail span { display: flex; align-items: center; gap: 0.25rem; }
        .hop-raw { margin-top: 0.5rem; padding: 0.6rem; border: 1px dashed var(--border); border-radius: 8px; color: var(--text-muted); font-family: 'Cascadia Mono', 'Consolas', monospace; font-size: 0.62rem; word-break: break-word; background: rgba(0,0,0,0.12); }
        .hop-alert { margin-top: 0.5rem; padding: 0.35rem 0.5rem; border-radius: 4px; background: rgba(201, 80, 122, 0.14); color: var(--error); font-size: 0.68rem; }
        .hop-delay { padding: 0.125rem 0.375rem; border-radius: 4px; font-size: 0.625rem; font-weight: 600; }
        .delay-green { background: rgba(76, 175, 80, 0.2); color: var(--success); }
        .delay-yellow { background: rgba(212, 160, 86, 0.2); color: var(--warning); }
        .delay-red { background: rgba(201, 80, 122, 0.2); color: var(--error); }
        .analysis-table, .antispam-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; background: var(--surface); }
        .analysis-table th, .antispam-table th { text-align: left; min-height: 48px; padding: 0.9rem 0.85rem; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; font-weight: 800; border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.08em; line-height: 1.35; }
        .analysis-table td, .antispam-table td { min-height: 54px; padding: 0.9rem 0.85rem; border-bottom: 1px solid var(--border); font-family: 'Cascadia Mono', 'Consolas', monospace; vertical-align: top; line-height: 1.55; }
        .analysis-table tr:nth-child(even), .antispam-table tr:nth-child(even) { background: rgba(0,0,0,0.1); }
        .analysis-table tr:hover, .antispam-table tr:hover { background: rgba(79,152,163,0.15); }
        .analysis-table td:first-child, .antispam-table td:first-child { font-weight: 600; color: var(--primary); width: 120px; background: var(--surface); }
        .analysis-evidence { color: var(--text-muted); font-size: 0.76rem; line-height: 1.55; word-break: break-word; }
        .table-card-body { padding: 0.9rem; overflow-x: auto; }
        .table-card-body .analysis-table { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .evidence-block { margin-top: 0.85rem; padding: 0.85rem; border: 1px dashed var(--border); border-radius: 10px; background: rgba(0,0,0,0.12); }
        .light .evidence-block { background: rgba(15,23,42,0.04); }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .summary-item { background: rgba(7,11,24,0.42); border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem; position: relative; overflow: hidden; }
        .summary-item:before { content: ''; position: absolute; inset: 0 auto 0 0; width: 3px; background: linear-gradient(180deg, var(--primary), var(--accent)); opacity: 0.8; }
        .light .summary-item { background: #f8fbff; }
        .summary-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.25rem; font-weight: 800; }
        .summary-value { font-family: 'Cascadia Mono', 'Consolas', monospace; font-size: 0.85rem; word-break: break-all; }
        .copy-btn { position: sticky; bottom: 1rem; align-self: flex-end; }
        @media print {
            body { background: #fff; color: #000; }
            .header, .input-panel, .copy-btn, .theme-toggle { display: none !important; }
            .main { display: block; }
            .results-panel { width: 100%; padding: 0; }
            .card { border: 1px solid #ccc; break-inside: avoid; margin-bottom: 1rem; }
            .card-header { background: #f0f0f0; border-bottom: 1px solid #ccc; }
            .card-body { padding: 0.5rem; }
            .field-row { border-bottom: 1px solid #eee; }
            .field-key { color: #666; }
            .field-value { color: #000; }
            .badge { border: 1px solid currentColor; padding: 0.1rem 0.3rem; font-size: 0.6rem; }
            .badge-pass { background: #e8f5e9; color: #2e7d32; }
            .badge-fail { background: #ffebee; color: #c62828; }
            .badge-warn { background: #fff3e0; color: #ef6c00; }
            .badge-none { background: #f5f5f5; color: #666; }
            .analysis-table th, .antispam-table th { background: #eee; }
            .analysis-table td, .analysis-table th, .antispam-table td, .antispam-table th { border: 1px solid #ccc; }
            .risk-banner { border: 2px solid #000; }
            .risk-high { background: #ffebee; color: #c62828; }
            .risk-medium { background: #fff3e0; color: #ef6c00; }
            .risk-low { background: #e8f5e9; color: #2e7d32; }
            .hop-chain { page-break-inside: avoid; }
            .hop-card { border: 1px solid #ccc; margin-bottom: 0.5rem; }
        }
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; padding: 2rem; }
        .domain-warning { background: rgba(212, 160, 86, 0.15); border: 1px solid var(--warning); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.75rem; color: var(--warning); margin-top: 0.5rem; }
        .security-alert-card { border: 1px solid rgba(201, 80, 122, 0.55); background: linear-gradient(135deg, rgba(201,80,122,0.12), rgba(79,152,163,0.05)); box-shadow: 0 18px 45px rgba(0,0,0,0.18); }
        .security-alert-header { background: linear-gradient(135deg, rgba(201,80,122,0.22), rgba(201,80,122,0.08)); border-bottom: 1px solid rgba(201,80,122,0.4); }
        .security-alert-title { display: flex; flex-direction: column; gap: 0.15rem; }
        .security-alert-title span:first-child { font-size: 0.9rem; }
        .security-alert-subtitle { color: var(--text-muted); font-size: 0.68rem; font-weight: 400; }
        .security-alert-body { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 0.75rem; padding: 1rem; }
        .security-alert-item { display: flex; gap: 0.65rem; align-items: flex-start; background: rgba(0,0,0,0.16); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem; }
        .light .security-alert-item { background: rgba(255,255,255,0.55); }
        .security-alert-severity { flex-shrink: 0; min-width: 52px; text-align: center; }
        .security-alert-text { font-size: 0.78rem; line-height: 1.4; color: var(--text); }
        .security-alert-evidence { margin-top: 0.45rem; color: var(--text-muted); font-family: 'Cascadia Mono', 'Consolas', monospace; font-size: 0.64rem; line-height: 1.45; word-break: break-word; }
        .forefront-header { background: linear-gradient(135deg, rgba(25,199,212,0.10), rgba(139,92,246,0.08)) !important; }
        .forefront-header.is-alert { background: linear-gradient(135deg, rgba(255,95,143,0.18), rgba(139,92,246,0.08)) !important; }
        .forefront-header .card-title { color: var(--text) !important; }
        .shortcut-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
        .hidden { display: none !important; }
        @media (max-width: 900px) { .main { flex-direction: column; } .input-panel { width: 100%; min-width: 100%; border-right: none; border-bottom: 1px solid var(--border); } .input-panel textarea { min-height: 200px; } body.report-mode .input-panel { width: min(100vw, 420px); min-width: 0; } .report-actions { overflow-x: auto; } }
    </style>
</head>
<body>
    <header class="header">
        <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        <h1 id="appTitle">Email Header Analyzer</h1>
        <div class="lang-toggle" aria-label="Language selector">
            <button class="lang-btn" id="langEsBtn" type="button">ES</button>
            <button class="lang-btn" id="langEnBtn" type="button">EN</button>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
    </header>
    <div class="report-actions" id="reportActions">
        <button class="btn btn-secondary" id="editHeadersBtn">Edit Headers</button>
        <button class="btn btn-primary" id="reanalyzeBtn">Re-analyze</button>
        <button class="btn btn-secondary" id="topCopyBtn">Copy Report</button>
        <button class="btn btn-secondary" id="topPdfBtn">Export PDF</button>
        <button class="btn btn-secondary" id="reportClearBtn">Clear</button>
    </div>
    <main class="main">
        <aside class="input-panel">
            <label for="headersInput">Raw Email Headers</label>
            <textarea id="headersInput" placeholder="Paste raw email headers here..."></textarea>
            <div class="btn-row">
                <button class="btn btn-primary" id="analyzeBtn">Analyze</button>
                <button class="btn btn-secondary" id="clearBtn">Clear</button>
            </div>
            <button class="link-btn" id="loadSampleBtn">Load Sample</button>
            <p class="shortcut-hint">Press Ctrl+Enter to analyze</p>
        </aside>
        <section class="results-panel" id="resultsPanel">
            <div class="empty-state" id="emptyState"><p>Paste email headers and click Analyze</p></div>
            <div id="reportContainer"></div>
        </section>
    </main>
    <div class="drawer-backdrop" id="drawerBackdrop"></div>
    <script>

                addPdfSection(lines, 'X-Forefront-Antispam-Report');
                for (var a = 0; a < (data.antiSpamData || []).length; a++) addPdfKeyValue(lines, data.antiSpamData[a].key, data.antiSpamData[a].value + ' - ' + (data.antiSpamData[a].description || ''));

                addPdfSection(lines, 'X-Microsoft-Antispam');
                for (var m = 0; m < (data.microsoftAntispamData || []).length; m++) addPdfKeyValue(lines, data.microsoftAntispamData[m].key, data.microsoftAntispamData[m].value + ' - ' + (data.microsoftAntispamData[m].description || ''));

                if (data.securityAlerts && data.securityAlerts.length) {
                    addPdfSection(lines, currentLang === 'es' ? 'ALERTA DE SEGURIDAD' : 'SECURITY ALERT');
                    for (var s = 0; s < data.securityAlerts.length; s++) {
                        addPdfKeyValue(lines, '[' + data.securityAlerts[s].level.toUpperCase() + ']', data.securityAlerts[s].text);
                        addPdfKeyValue(lines, currentLang === 'es' ? 'Evidencia' : 'Evidence', data.securityAlerts[s].evidence || 'Empty');
                    }
                }
                return lines;
            }
            function renderPdfPages(lines) {
                var pages = [];
                var current = [];
                var y = 770;
                for (var i = 0; i < lines.length; i++) {
                    var item = lines[i];
                    var size = item.size || 9;
                    var gapBefore = item.gapBefore || 0;
                    var lineHeight = Math.max(12, size + 4);
                    if (y - gapBefore - lineHeight < 55) {
                        pages.push(current);
                        current = [];
                        y = 770;
                    }
                    y -= gapBefore;
                    current.push({ text: item.text, size: size, bold: !!item.bold, y: y });
                    y -= lineHeight;
                }
                if (current.length) pages.push(current);
                return pages;
            }
            function buildPdfDocument(lines) {
                var pages = renderPdfPages(lines);
                var objects = [];
                function addObject(body) { objects.push(body); return objects.length; }
                var catalogId = addObject('');
                var pagesId = addObject('');
                var fontId = addObject('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
                var pageIds = [];
                for (var p = 0; p < pages.length; p++) {
                    var content = 'BT\n';
                    content += '/F1 8 Tf 50 28 Td ' + pdfHexText((currentLang === 'es' ? 'Pagina ' : 'Page ') + (p + 1) + ' / ' + pages.length) + ' Tj\n';
                    content += 'ET\n';
                    for (var l = 0; l < pages[p].length; l++) {
                        var item = pages[p][l];
                        content += 'BT\n/F1 ' + item.size + ' Tf\n50 ' + item.y + ' Td\n' + pdfHexText(item.text) + ' Tj\nET\n';
                    }
                    var contentId = addObject('<< /Length ' + content.length + ' >>\nstream\n' + content + 'endstream');
                    var pageId = addObject('<< /Type /Page /Parent ' + pagesId + ' 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 ' + fontId + ' 0 R >> >> /Contents ' + contentId + ' 0 R >>');
                    pageIds.push(pageId);
                }
                objects[catalogId - 1] = '<< /Type /Catalog /Pages ' + pagesId + ' 0 R >>';
                objects[pagesId - 1] = '<< /Type /Pages /Kids [' + pageIds.map(function(id) { return id + ' 0 R'; }).join(' ') + '] /Count ' + pageIds.length + ' >>';
                var pdf = '%PDF-1.4\n';
                var offsets = [0];
                for (var o = 0; o < objects.length; o++) {
                    offsets.push(pdf.length);
                    pdf += (o + 1) + ' 0 obj\n' + objects[o] + '\nendobj\n';
                }
                var xref = pdf.length;
                pdf += 'xref\n0 ' + (objects.length + 1) + '\n0000000000 65535 f \n';
                for (var x = 1; x < offsets.length; x++) pdf += ('0000000000' + offsets[x]).slice(-10) + ' 00000 n \n';
                pdf += 'trailer\n<< /Size ' + (objects.length + 1) + ' /Root ' + catalogId + ' 0 R >>\nstartxref\n' + xref + '\n%%EOF';
                return pdf;
            }
            window.generatePdfReport = function() {
                var data = window.currentReportData;
                if (!data) return;
                var report = document.getElementById('reportContainer');
                if (!report || !report.innerHTML.trim()) return;
                var styles = document.querySelector('style').innerHTML;
                var fileTitle = pdfEscapeNamePart(data.subject || 'email-header-analysis') + '-' + new Date().toISOString().slice(0, 10);
                var printableHtml = '<!DOCTYPE html><html lang="' + currentLang + '"><head><meta charset="UTF-8"><title>' + escapeHtml(fileTitle) + '</title><style>' + styles + '\nbody{background:var(--bg);color:var(--text);padding:24px;} .pdf-shell{max-width:1180px;margin:0 auto;} .pdf-meta{margin-bottom:18px;color:var(--text-muted);font-family:Cascadia Mono,Consolas,monospace;font-size:0.78rem;} .report-actions,.copy-btn,.header,.input-panel,.drawer-backdrop{display:none!important;} @media print{body{background:#fff!important;color:#111!important;padding:0;} .pdf-shell{max-width:none;margin:0;} .card{break-inside:avoid;box-shadow:none!important;margin-bottom:16px;} .card-header{background:#f3f6fb!important;color:#111!important;} .card-title,.field-value,.field-key,.analysis-table td,.analysis-table th,.analysis-evidence{color:#111!important;} .analysis-table th{background:#dfe9f7!important;color:#111!important;} .badge{print-color-adjust:exact;-webkit-print-color-adjust:exact;} .risk-banner,.card-icon{print-color-adjust:exact;-webkit-print-color-adjust:exact;} .evidence-block{background:#f7f7f7!important;} }</style></head><body class="' + (document.body.classList.contains('light') ? 'light' : '') + '"><main class="pdf-shell"><div class="pdf-meta">' + escapeHtml(t('exportPdf')) + ': ' + escapeHtml(new Date().toLocaleString()) + '</div>' + report.innerHTML + '</main><script>window.onload=function(){setTimeout(function(){window.print();},250);};<\/script></body></html>';
                var printWindow = window.open('', '_blank');
                if (!printWindow) {
                    alert(currentLang === 'es' ? 'Permite ventanas emergentes para exportar el PDF.' : 'Allow pop-ups to export the PDF.');
                    return;
                }
                printWindow.document.open();
                printWindow.document.write(printableHtml);
                printWindow.document.close();
            };
        });
    </script>
